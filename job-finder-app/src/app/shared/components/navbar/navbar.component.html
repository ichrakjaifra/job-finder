<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" routerLink="/">
      <i class="bi bi-briefcase me-2"></i>
      <span class="fw-bold">JobFinder</span>
    </a>

    <button class="navbar-toggler" type="button" (click)="toggleMenu()">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" [class.show]="!isMenuCollapsed">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/jobs" routerLinkActive="active">
            <i class="bi bi-search me-1"></i> Recherche
          </a>
        </li>

        @if (currentUser) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/favorites" routerLinkActive="active">
              <i class="bi bi-star me-1"></i> Favoris
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/applications" routerLinkActive="active">
              <i class="bi bi-list-check me-1"></i> Candidatures
            </a>
          </li>
        }
      </ul>

      <div class="d-flex align-items-center">
        @if (currentUser) {
          <div class="dropdown">
            <button class="btn btn-outline-light dropdown-toggle d-flex align-items-center"
                    type="button"
                    data-bs-toggle="dropdown">
              <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-2"
                   style="width: 32px; height: 32px;">
                {{ userInitials }}
              </div>
              <span>{{ currentUser.firstName }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <a class="dropdown-item" routerLink="/profile">
                  <i class="bi bi-person me-2"></i> Mon Profil
                </a>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <button class="dropdown-item text-danger" (click)="logout()">
                  <i class="bi bi-box-arrow-right me-2"></i> Déconnexion
                </button>
              </li>
            </ul>
          </div>
        } @else {
          <div class="d-flex gap-2">
            <a class="btn btn-outline-light" routerLink="/auth/login">
              <i class="bi bi-box-arrow-in-right me-1"></i> Connexion
            </a>
            <a class="btn btn-light text-primary" routerLink="/auth/register">
              <i class="bi bi-person-plus me-1"></i> Inscription
            </a>
          </div>
        }
      </div>
    </div>
  </div>
</nav>
