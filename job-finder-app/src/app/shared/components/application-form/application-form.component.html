<div class="modal-overlay">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg border-0">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">
          <i class="bi bi-plus-circle me-2"></i>
          Suivre cette candidature
        </h5>
        <button type="button" class="btn-close btn-close-white" (click)="onCancel()"></button>
      </div>

      <div class="modal-body p-4">
        <div class="mb-4">
          <h6 class="fw-bold text-primary mb-1">{{ jobTitle }}</h6>
          <p class="text-muted mb-0">
            <i class="bi bi-building me-1"></i> {{ company }}
          </p>
        </div>

        <form (ngSubmit)="onSubmit()" #applicationForm="ngForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">
              <i class="bi bi-journal-text me-1"></i> Notes personnelles
            </label>
            <textarea class="form-control"
                      rows="4"
                      [(ngModel)]="notes"
                      name="notes"
                      placeholder="Ajoutez vos notes ici... (date d'envoi, personnes à contacter, relances, etc.)"></textarea>
            <div class="form-text">
              Ces notes sont privées et visibles uniquement par vous.
            </div>
          </div>

          <div class="d-flex gap-2 justify-content-end">
            <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">
              Annuler
            </button>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i> Confirmer
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
