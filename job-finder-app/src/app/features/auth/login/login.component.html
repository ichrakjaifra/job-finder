<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <!-- En-tête -->
          <div class="text-center mb-4">
            <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                 style="width: 60px; height: 60px;">
              <i class="bi bi-briefcase text-white fs-3"></i>
            </div>
            <h2 class="fw-bold text-primary">Connexion</h2>
            <p class="text-muted">Accédez à votre compte JobFinder</p>
          </div>

          <!-- Formulaire -->
          <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">
                <i class="bi bi-envelope me-1"></i> Adresse email
              </label>
              <input type="email"
                     class="form-control form-control-lg"
                     id="email"
                     [(ngModel)]="credentials.email"
                     name="email"
                     placeholder="votre@email.com"
                     required>
            </div>

            <!-- Mot de passe -->
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">
                <i class="bi bi-lock me-1"></i> Mot de passe
              </label>
              <input type="password"
                     class="form-control form-control-lg"
                     id="password"
                     [(ngModel)]="credentials.password"
                     name="password"
                     placeholder="Votre mot de passe"
                     required>
            </div>

            <!-- Message d'erreur -->
            @if (errorMessage) {
              <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                {{ errorMessage }}
                <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
              </div>
            }

            <!-- Bouton de connexion -->
            <button type="submit"
                    class="btn btn-primary btn-lg w-100 mb-3"
                    [disabled]="loading">
              @if (loading) {
                <span class="spinner-border spinner-border-sm me-2" role="status"></span>
              }
              <i class="bi bi-box-arrow-in-right me-2"></i> Se connecter
            </button>

            <!-- Lien d'inscription -->
            <div class="text-center">
              <p class="text-muted mb-0">
                Vous n'avez pas de compte ?
                <a routerLink="/auth/register" class="text-primary fw-semibold text-decoration-none ms-1">
                  S'inscrire
                </a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
